name: docs-render

# Render-check every ```mermaid block in the repo. A block that fails to render is a broken
# deliverable — like a failing test — so it must not merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Render every Mermaid diagram
        run: |
          set -euo pipefail
          mapfile -t files < <(grep -rl '```mermaid' --include='*.md' . | sort)
          if [[ ${#files[@]} -eq 0 ]]; then echo "no mermaid blocks"; exit 0; fi
          printf 'rendering: %s\n' "${files[@]}"
          bash scripts/render-diagrams.sh "${files[@]}"
