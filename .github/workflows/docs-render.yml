name: docs-render

# Render-check every ```mermaid block in the repo. A block that fails to render is a broken
# deliverable — like a failing test — so it must not merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Render every Mermaid diagram
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r _f; do files+=("$_f"); done \
            < <(grep -rl '```mermaid' --include='*.md' . | sort)
          if [[ ${#files[@]} -eq 0 ]]; then echo "no mermaid blocks"; exit 0; fi
          printf 'rendering: %s\n' "${files[@]}"
          bash scripts/render-diagrams.sh "${files[@]}"
